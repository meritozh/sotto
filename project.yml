name: Sotto

options:
  bundleIdPrefix: com.meritozh
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  developmentLanguage: en
  localPackagesGroup: Packages

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N59353RP3W
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"

packages:
  SottoKit:
    path: .

targets:
  Sotto:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sotto/App
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - package: SottoKit
        product: SottoKit
    settings:
      base:
        PRODUCT_NAME: Sotto
        PRODUCT_BUNDLE_IDENTIFIER: com.meritozh.sotto
        CODE_SIGN_ENTITLEMENTS: Sotto.entitlements
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME[sdk=macosx*]: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME[sdk=iphoneos*]: AppIcon_iOS
        ASSETCATALOG_COMPILER_APPICON_NAME[sdk=iphonesimulator*]: AppIcon_iOS
    info:
      path: Generated/Sotto-Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.finance
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Sotto
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleLocalizations:
          - en
          - zh-Hans

  SottoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SottoTests
    dependencies:
      - package: SottoKit
        product: SottoKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meritozh.sotto.tests
    info:
      path: Generated/SottoTests-Info.plist
      properties: {}

schemes:
  Sotto:
    build:
      targets:
        Sotto: all
    run:
      config: Debug
    archive:
      config: Release

  SottoTests:
    build:
      targets:
        SottoTests: all
    test:
      config: Debug
      targets:
        - SottoTests
